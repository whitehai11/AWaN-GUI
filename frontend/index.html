<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>AWaN GUI</title>
		<link rel="stylesheet" href="./styles.css" />
	</head>
	<body>
		<div class="shell">
			<aside class="sidebar">
				<div class="sidebar-top">
					<div class="brand-lockup">
						<div class="brand-mark">A</div>
						<div>
							<p class="brand-label">AWaN</p>
							<h1>Local chat</h1>
						</div>
					</div>
					<button id="refresh-agents" class="primary-action">Refresh list</button>
				</div>

				<nav class="sidebar-section">
					<div class="section-header">
						<h2>Agents</h2>
						<span class="section-meta">runtime</span>
					</div>
					<div id="agent-list" class="agent-list"></div>
				</nav>

				<div class="sidebar-nav">
					<button class="nav-item active" data-page="chat">Chat</button>
					<button class="nav-item" data-page="plugins">Plugins</button>
				</div>

				<div class="sidebar-footer">
					<p class="footer-label">Runtime</p>
					<p id="runtime-status" class="footer-status">Checking AWaN Core...</p>
					<p id="runtime-endpoint" class="footer-endpoint"></p>
				</div>
			</aside>

			<main class="main-column">
				<section id="chat-page" class="page active">
					<header class="hero">
						<div class="hero-copy">
							<p class="eyebrow">Chat</p>
							<h2 id="current-agent-label">Agent: default</h2>
						</div>
						<div class="hero-meta">
							<span id="current-model-label" class="pill">Model: openai</span>
							<span class="pill muted-pill">AWaN Core</span>
						</div>
					</header>

					<section id="chat-log" class="chat-log">
						<div class="empty-state">
							<h3>Start a conversation</h3>
							<p>Pick an agent from the left and send a prompt to AWaN Core.</p>
						</div>
					</section>

					<form id="chat-form" class="composer">
						<textarea id="prompt-input" rows="3" placeholder="Message AWaN"></textarea>
						<div class="composer-actions">
							<button type="submit" id="send-button">Send message</button>
						</div>
					</form>
				</section>

				<section id="plugins-page" class="page">
					<header class="hero">
						<div class="hero-copy">
							<p class="eyebrow">Plugins</p>
							<h2>Plugin manager</h2>
						</div>
						<div class="hero-meta">
							<input id="plugin-search-input" class="plugin-search-input" type="text" placeholder="Search registry plugins" />
							<button id="plugin-search-button" class="ghost">Search</button>
							<button id="refresh-plugins" class="ghost">Refresh</button>
						</div>
					</header>

					<div class="plugin-layout">
						<section class="panel side-panel">
							<div class="panel-header">
								<h2>Installed Plugins</h2>
								<span class="section-meta">local</span>
							</div>
							<div id="installed-plugins" class="stack"></div>
						</section>

						<section class="panel side-panel">
							<div class="panel-header">
								<h2>Available Plugins</h2>
								<span class="section-meta">registry</span>
							</div>
							<div id="available-plugins" class="stack"></div>
						</section>
					</div>
				</section>
			</main>

			<aside class="context-column">
				<section class="panel side-panel">
					<div class="panel-header">
						<h2>Memory</h2>
						<button id="refresh-memory" class="ghost">Reload</button>
					</div>
					<div id="memory-panel" class="stack"></div>
				</section>

				<section class="panel side-panel">
					<div class="panel-header">
						<h2>Files</h2>
						<button id="refresh-files" class="ghost">Reload</button>
					</div>
					<div id="files-panel" class="stack"></div>
				</section>
			</aside>
		</div>

		<script src="./app.js"></script>
	</body>
</html>
